name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        # pnpm 11 requires Node >= 22.13 (uses node:sqlite). Node 20 fails with
        # ERR_UNKNOWN_BUILTIN_MODULE during pnpm setup.
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        # Must match local dev (pnpm 11). The repo's pnpm-workspace.yaml uses
        # pnpm 11 settings keys (nodeLinker, allowBuilds) that pnpm 9 rejects
        # with "packages field missing or empty".
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Setup Rust toolchain
        # Pinned to stable branch SHA as of 2026-04-23.
        # dtolnay/rust-toolchain has no version tags beyond v1 — SHA is the
        # standard supply-chain pinning approach for this action.
        # To update: fetch HEAD of https://github.com/dtolnay/rust-toolchain/tree/stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable

      - name: Capture rustc version for cache key
        id: rustc-version
        run: echo "version=$(rustc --version | tr ' ' '-')" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ steps.rustc-version.outputs.version }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        # postinstall hook runs `pnpm build:native` → Rust .node is built here.
        # See scripts/build-native.mjs for the toolchain invocation.
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Test (Node)
        run: pnpm test

      - name: Test (Rust)
        run: cargo test -p smalti-core

      - name: Build
        run: pnpm run package
